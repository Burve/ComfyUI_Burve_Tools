[project]
name = "burve_tools"
description = "A collection of ComfyUI helper nodes with Gemini image generation for AI Studio and Vertex AI, plus adult character planning with age, gender, race, fantasy trait pipes, DynamicCombo model-specific controls, Google Search grounding, and thinking controls."
version = "2.0.0"
license = {file = "LICENSE"} 
