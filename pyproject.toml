dependencies = ["google-genai>=1.68.0,<2", "pillow"]

[project.urls]
Repository = "https://github.com/Burve/ComfyUI_Burve_Tools"
#  Used by Comfy Registry https://registry.comfy.org
Documentation = "https://github.com/Burve/ComfyUI_Burve_Tools/wiki"
"Bug Tracker" = "https://github.com/Burve/ComfyUI_Burve_Tools/issues"

[tool.comfy]
PublisherId = "burve"
DisplayName = "ComfyUI_Burve_Tools"
